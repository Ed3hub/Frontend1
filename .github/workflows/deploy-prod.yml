name: Build and Deploy Frontend (Production)

on:
  push:
    branches:
      - main

permissions:
  contents: read
  actions: read

env:
  REGISTRY: registry.digitalocean.com/ed3hub
  IMAGE_NAME: ed3hub-frontend

jobs:

  gitleaks:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Run basic tests
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create minimal .env for testing
        run: |
          echo "NEXT_PUBLIC_API_URL=https://api.ed3hub.com" >> .env.local
          echo "NEXT_PUBLIC_WS_URL=wss://api.ed3hub.com" >> .env.local
          echo "NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}" >> .env.local

      - name: Run Next.js build check
        run: npm run build

  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DOCR_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.ed3hub.com
            NEXT_PUBLIC_WS_URL=wss://api.ed3hub.com
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}

  trivy:
    name: Scan image for vulnerabilities
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DOCR_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod
          format: json
          output: trivy-results.json
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Convert JSON to HTML report
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            aquasec/trivy:0.69.0 \
            convert \
            --format template \
            --template "@/contrib/html.tpl" \
            --output /workspace/trivy-report.html \
            /workspace/trivy-results.json

      - name: Upload Trivy report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-vulnerability-report-prod
          path: |
            trivy-results.json
            trivy-report.html
          retention-days: 30
          if-no-files-found: ignore

  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: trivy
    steps:
      - name: SSH into Droplet and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            doctl registry login --expiry-seconds 1200
            docker pull registry.digitalocean.com/ed3hub/ed3hub-frontend:prod
            docker compose -f /var/www/ed3hub/prod/docker-compose.prod.yml up -d --no-deps frontend-prod
            docker image prune -f